<head>
<meta charset="UTF-8">

<title>MYROOM — Место для друзей</title>
<meta http-equiv="refresh" content="3;url=https://wa.me/77085014444?text=Здравствуйте%2C%20пишу%20с%20Instagram%2C%20хочу%20забронировать">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Onest:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'Onest', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow-yellow {
    position: fixed; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,0,0.08) 0%, transparent 70%);
    top: 30%; left: 30%; transform: translate(-50%,-50%);
    pointer-events: none; animation: pulseY 5s ease-in-out infinite;
  }
  .glow-red {
    position: fixed; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(220,50,50,0.07) 0%, transparent 70%);
    top: 70%; left: 70%; transform: translate(-50%,-50%);
    pointer-events: none; animation: pulseY 5s ease-in-out infinite 2.5s;
  }
  @keyframes pulseY {
    0%,100% { opacity:0.5; transform:translate(-50%,-50%) scale(1); }
    50% { opacity:1; transform:translate(-50%,-50%) scale(1.15); }
  }
  .container {
    position: relative; z-index: 1; text-align: center;
    padding: 2rem; display: flex; flex-direction: column;
    align-items: center;
  }
  .logo-img {
    width: clamp(200px, 55vw, 300px); height: auto; border-radius: 16px;
    animation: logoIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-bottom: 2.5rem;
  }
  @keyframes logoIn {
    from { transform:scale(0.7); opacity:0; }
    to { transform:scale(1); opacity:1; }
  }
  .redirect-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; padding: 2rem 2.5rem;
    max-width: 360px; width: 100%;
    animation: cardIn 0.6s ease 0.3s both;
  }
  @keyframes cardIn {
    from { transform:translateY(20px); opacity:0; }
    to { transform:translateY(0); opacity:1; }
  }
  .icon-wrap {
    width: 54px; height: 54px;
    background: rgba(37,211,102,0.12);
    border: 1px solid rgba(37,211,102,0.25);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 1.25rem;
  }
  .redirect-card h2 {
    font-family: 'Unbounded', sans-serif; font-size: 0.9rem;
    font-weight: 400; margin-bottom: 0.6rem; color: #f0ede8;
  }
  .redirect-card p {
    font-size: 0.82rem; color: rgba(240,237,232,0.45);
    line-height: 1.6; margin-bottom: 1.75rem;
  }
  .progress-bar {
    height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 99px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffc800, #dc3232);
    border-radius: 99px; animation: fill 3s linear forwards;
  }
  @keyframes fill { from{width:0%} to{width:100%} }
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; background: #25d366; color: #0a0a0a;
    text-decoration: none; font-family: 'Unbounded', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    padding: 1rem 2rem; border-radius: 99px; width: 100%;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(37,211,102,0.2);
  }
  .btn:hover { transform:scale(1.03); box-shadow:0 0 40px rgba(37,211,102,0.35); }
  .footer-note {
    margin-top: 2.5rem; font-size: 0.7rem;
    color: rgba(240,237,232,0.18); letter-spacing: 0.08em; text-transform: uppercase;
  }
</style>
